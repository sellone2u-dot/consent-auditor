<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Consent Auditor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:440px;height:580px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;font-size:13px}
body{display:flex;flex-direction:column}

.header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#13161f;border-bottom:1px solid #1e2130;flex-shrink:0}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#1e5fa8,#3a8fd4);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.htext h1{font-size:13px;font-weight:500;color:#fff}
.htext p{font-size:10px;color:#6b7090}
.scan-btn{margin-left:auto;background:#1e5fa8;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer}
.scan-btn:hover{background:#1a4f8a}
.scan-btn:disabled{background:#1e2a40;color:#4a5270;cursor:not-allowed}

.url-bar{padding:4px 14px;font-size:10px;color:#4a5270;background:#0d0f17;border-bottom:1px solid #1e2130;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.status{padding:5px 14px;font-size:11px;color:#6b7090;display:flex;align-items:center;gap:6px;border-bottom:1px solid #1e2130;background:#0d0f17;flex-shrink:0}
.sp{width:11px;height:11px;border:2px solid #1e2130;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.grade-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#13161f;border-bottom:1px solid #1e2130;flex-shrink:0}
.gc{width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2.5px solid;flex-shrink:0}
.gc .gl{font-size:20px;font-weight:600;line-height:1}
.gc .gw{font-size:8px;text-transform:uppercase;letter-spacing:.4px;margin-top:1px;opacity:.8}
.gA{background:rgba(99,153,34,.18);border-color:#639922;color:#8bd44a}
.gB{background:rgba(30,95,168,.18);border-color:#378ADD;color:#6ab4f5}
.gC{background:rgba(239,159,39,.14);border-color:#EF9F27;color:#f5bc62}
.gD{background:rgba(226,75,74,.14);border-color:#E24B4A;color:#f07776}
.gF{background:rgba(163,45,45,.18);border-color:#A32D2D;color:#e05050}
.gm h2{font-size:12px;font-weight:500;color:#fff;margin-bottom:2px}
.gm p{font-size:11px;color:#8b8fa8;line-height:1.4}

.stats-row{display:flex;border-bottom:1px solid #1e2130;flex-shrink:0}
.stat{flex:1;padding:6px 4px;text-align:center;border-right:1px solid #1e2130}
.stat:last-child{border-right:none}
.stat .sv{font-size:14px;font-weight:500;color:#fff;display:block}
.stat .sl{font-size:9px;text-transform:uppercase;letter-spacing:.3px;color:#4a5270;margin-top:1px;display:block}

.gtm-bar{padding:5px 14px;background:#0d0f17;border-bottom:1px solid #1e2130;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0}
.gtm-label{font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:#4a5270;flex-shrink:0}
.gtm-pill{background:rgba(55,138,221,.15);border:1px solid rgba(55,138,221,.3);color:#6ab4f5;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:500;font-family:monospace}
.gtm-pill.warn{background:rgba(239,159,39,.12);border-color:rgba(239,159,39,.3);color:#f5bc62}

.sig-box{padding:6px 14px;font-size:11px;line-height:1.5;border-bottom:1px solid #1e2130;flex-shrink:0}
.sig-pass{background:rgba(99,153,34,.1);color:#8bd44a}
.sig-warn{background:rgba(239,159,39,.08);color:#f5bc62}
.sig-label{font-size:9px;text-transform:uppercase;letter-spacing:.4px;opacity:.7;margin-bottom:1px}

.tabs{display:flex;background:#0d0f17;border-bottom:1px solid #1e2130;flex-shrink:0}
.tab{flex:1;padding:8px 4px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:none;color:#4a5270;border-bottom:2px solid transparent;text-align:center}
.tab.on{color:#fff;border-bottom-color:#378ADD}
.tab:hover:not(.on){color:#8b90b0}

/* The key fix — panels container takes all remaining height */
.panels{flex:1;overflow:hidden;position:relative;min-height:0}
.panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto}
.panel.on{display:block}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-track{background:#0d0f17}
.panel::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}

/* Finding rows */
.finding{border-bottom:1px solid #1e2130}
.fh{
  display:flex;align-items:center;gap:10px;
  padding:13px 14px;
  cursor:pointer;background:#13161f;
  border:none;width:100%;text-align:left;
  color:inherit;font-family:inherit;
}
.fh:hover{background:#1c2030}
.fh:active{background:#222538}
.fi2{font-size:15px;flex-shrink:0}
.ft{flex:1;font-size:12px;font-weight:500;color:#d0d4e8;line-height:1.35}
.fright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.fb{font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;white-space:nowrap}
.bp{background:rgba(99,153,34,.2);color:#8bd44a}
.bw{background:rgba(239,159,39,.15);color:#f5bc62}
.br{background:rgba(226,75,74,.15);color:#f07776}
.bi{background:rgba(55,138,221,.15);color:#6ab4f5}
.farr{font-size:16px;color:#6b7090;transition:transform .15s;display:inline-block}
.farr.open{transform:rotate(180deg);color:#6ab4f5}

.fbody{background:#0a0c14;padding:12px 14px;display:none}
.wb{background:#13161f;border-radius:5px;padding:8px 10px;margin-bottom:8px}
.wl{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:#3a4060;font-weight:500;margin-bottom:3px}
.wt{font-size:11px;color:#b0b4cc;line-height:1.6}
.wd{font-size:11px;color:#6b7090;line-height:1.6;margin-bottom:7px}
.act{background:rgba(30,95,168,.12);border-left:2px solid #378ADD;padding:7px 9px;font-size:11px;color:#6ab4f5;line-height:1.5}

.fi-row{display:flex;align-items:center;gap:7px;padding:7px 14px;border-bottom:1px solid #1a1d2a;font-size:11px}
.fnum{width:16px;height:16px;border-radius:50%;background:#1a1d2a;display:flex;align-items:center;justify-content:center;font-size:8px;color:#4a5270;flex-shrink:0}
.fn2{flex:1;color:#c0c4dc}
.fdom{font-size:10px;color:#333850;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fbg2{font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;flex-shrink:0}
.fg{background:rgba(99,153,34,.2);color:#8bd44a}
.fr2{background:rgba(226,75,74,.15);color:#f07776}
.fa2{background:rgba(239,159,39,.12);color:#f5bc62}
.fbl{background:rgba(55,138,221,.15);color:#6ab4f5}
.fk{background:#1a1d2a;color:#4a5270}

.ck-row{display:flex;align-items:center;gap:7px;padding:7px 14px;border-bottom:1px solid #1a1d2a}
.ck-name{flex:1;font-family:monospace;font-size:11px;color:#b0b4cc}
.dom-row{display:flex;align-items:center;gap:7px;padding:6px 14px;border-bottom:1px solid #1a1d2a;font-size:11px;color:#6b7090}
.dom-name{flex:1}
.sh{padding:5px 14px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:#333850;background:#0a0c14;border-bottom:1px solid #1a1d2a;position:sticky;top:0;z-index:1}
.empty{text-align:center;padding:2rem 1rem}
.empty span{font-size:28px;display:block;margin-bottom:.5rem}
.empty p{font-size:11px;color:#4a5270;line-height:1.5}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🛡️</div>
  <div class="htext"><h1>Consent Auditor</h1><p>Dealer compliance tool</p></div>
  <button class="scan-btn" id="scanBtn">Scan page</button>
</div>
<div class="url-bar" id="urlBar">—</div>
<div class="status" id="statusBar"><span>Click Scan page to analyze this website.</span></div>
<div id="gradeBar" style="display:none" class="grade-bar"></div>
<div id="statsRow" style="display:none" class="stats-row"></div>
<div id="gtmBar" style="display:none" class="gtm-bar"></div>
<div id="sigBox" style="display:none" class="sig-box"></div>

<div class="tabs" id="tabsEl" style="display:none">
  <button class="tab on" id="tab-findings">Findings</button>
  <button class="tab" id="tab-firing">Firing order</button>
  <button class="tab" id="tab-cookies">Cookies</button>
  <button class="tab" id="tab-domains">Domains</button>
</div>

<div class="panels" id="panelsEl" style="display:none">
  <div id="p-findings" class="panel on"></div>
  <div id="p-firing" class="panel"></div>
  <div id="p-cookies" class="panel"></div>
  <div id="p-domains" class="panel"></div>
</div>

<div id="emptyArea">
  <div class="empty"><span>🔍</span><p>Navigate to any dealership website<br>then click <strong>Scan page</strong></p></div>
</div>

<script src="popup.js"></script>
</body>
</html>
